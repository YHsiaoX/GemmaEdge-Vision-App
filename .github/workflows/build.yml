name: Build Shell iOS App (Vision)
on: [push]

jobs:
  build:
    runs-on: macos-15  # 升级到最新的 macOS 15 镜像（自带 Xcode 16）
    steps:
      - uses: actions/checkout@v3

      - name: Install Xcodegen & Generate Project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Install Google MediaPipe
        run: pod install

      - name: Build the App (Unsigned)
        run: |
          # 使用 -list 查看可用 scheme 以防万一，并强制使用新的工作空间
          xcodebuild -workspace Synapse.xcworkspace \
                     -scheme Synapse \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          # 使用更精准的路径抓取 .app 文件
          cp -R build/Build/Products/Release-iphoneos/Synapse.app Payload/
          zip -r Synapse.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synapse-IPA
          path: Synapse.ipa

      - name: 🚀 发布到 Releases
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          files: Synapse.ipa
          tag_name: v${{ github.run_number }}
          name: Synapse 极速安装包 v${{ github.run_number }}
          body: |
            已集成端侧大模型核心 (Synapse Engine)。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
