name: Build Unsigned iOS App (Vision)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build IPA on Cloud Mac
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set Default Xcode Version
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Download Gemma Model from HuggingFace (Mock)
      run: |
        echo "正在云端高速下载模型..."
        mkdir -p Sources
        wget -O Sources/gemma-4-E4B-it-web.task "https://huggingface.co/huggingworld/gemma-4-E4B-it-litert-lm/resolve/main/gemma-4-E4B-it-web.task?download=true"

    - name: Install Xcodegen & Generate Project
      run: |
        brew install xcodegen
        xcodegen generate

    - name: Install Google MediaPipe
      run: pod install

    - name: Build the App (Unsigned)
      run: |
        xcodebuild clean build \
          -workspace GemmaEdge.xcworkspace \
          -scheme GemmaEdge \
          -configuration Release \
          -sdk iphoneos \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          CONFIGURATION_BUILD_DIR="$(pwd)/build"

    - name: Package into .ipa
      run: |
        mkdir -p Payload
        mv build/GemmaEdge.app Payload/
        zip -r GemmaEdge.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GemmaEdge-Vision-App
        path: GemmaEdge.ipa
    - name: 🚀 发布到 Releases (满速下载通道)
      uses: softprops/action-gh-release@v2
      with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Gemma Edge 稳定版 (高速下载)"
          files: "**/*.ipa"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
