name: Build Synapse
on: [push]
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install Tools
        run: brew install xcodegen
      - name: Generate and Pods
        run: |
          xcodegen generate
          pod install
      - name: Build App
        run: |
          xcodebuild -workspace Synapse.xcworkspace \
                     -scheme Synapse \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGN_IDENTITY="" \
                     clean build
      - name: Create IPA
        run: |
          mkdir -p Payload
          # 暴力搜索 .app 并打包，防止路径差异
          find build -name "Synapse.app" -type d -exec cp -R {} Payload/ \;
          zip -r Synapse.ipa Payload
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Synapse-IPA
          path: Synapse.ipa
