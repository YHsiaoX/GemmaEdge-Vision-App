name: Build Shell iOS App (Vision)
on: [push]

jobs:
  build:
    runs-on: macos-14  # 明确使用 macOS 14 镜像
    steps:
      - uses: actions/checkout@v3

      - name: Install Xcodegen & Generate Project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Install Google MediaPipe
        run: pod install

      - name: Build the App (Unsigned)
        run: |
          xcodebuild -workspace Synapse.xcworkspace \
                     -scheme Synapse \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          # 自动定位生成的 .app 文件并移动到 Payload
          find build/Build/Products/Release-iphoneos -name "*.app" -exec mv {} Payload/ \;
          zip -r Synapse.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synapse-IPA
          path: Synapse.ipa

      - name: 🚀 发布到 Releases (满速下载通道)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          files: Synapse.ipa
          tag_name: v${{ github.run_number }}
          name: Synapse 极速安装包 v${{ github.run_number }}
          body: |
            已集成端侧大模型核心。
            - 软件名: Synapse
            - 图标: 赛博蓝光电路
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
