name: Build Shell iOS App (Vision)
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set Default Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      - name: Install Xcodegen & Generate Project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Install Google MediaPipe
        run: pod install

      - name: Build the App (Unsigned)
        run: |
          xcodebuild -workspace Synapse.xcworkspace \
                     -scheme Synapse \
                     -configuration Release \
                     -sdk iphoneos \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          mv build/Release-iphoneos/Synapse.app Payload/
          zip -r Synapse.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synapse-IPA
          path: Synapse.ipa

      - name: 🚀 发布到 Releases (满速下载通道)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          files: Synapse.ipa
          tag_name: v${{ github.run_number }}
          name: Synapse 极速安装包 v${{ github.run_number }}
          body: |
            已集成端侧大模型核心。
            - 软件名: Synapse
            - 图标: 赛博蓝光电路
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
