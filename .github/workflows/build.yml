name: Build Shell iOS App (Vision)
on: [push]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v3

      - name: Install Xcodegen & Generate Project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Install Google MediaPipe
        run: pod install

      - name: Build the App (Unsigned)
        run: |
          # 关键点：添加了 -destination 参数，防止图标编译时的瘦身报错
          xcodebuild -workspace Synapse.xcworkspace \
                     -scheme Synapse \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build

      - name: Package into .ipa
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/Synapse.app Payload/
          zip -r Synapse.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Synapse-IPA
          path: Synapse.ipa

      - name: 🚀 发布到 Releases
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        with:
          files: Synapse.ipa
          tag_name: v${{ github.run_number }}
          name: Synapse 极速安装包 v${{ github.run_number }}
          body: |
            已集成端侧大模型核心 (Synapse Engine)。
            - 修正了图标编译瘦身失败的问题。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
