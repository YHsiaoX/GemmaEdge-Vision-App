name: Synapse
options:
  bundleIdPrefix: com.synapse
targets:
  Synapse:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Source
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Synapse"
        ASSETCATALOG_COMPILER_APPICON_NAME: "AppIcon"
# 显式定义 Scheme，解决 "scheme not found" 报错
schemes:
  Synapse:
    build:
      targets:
        Synapse: [all]
