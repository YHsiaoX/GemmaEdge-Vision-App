name: Synapse
options:
  bundleIdPrefix: com.synapse
targets:
  Synapse:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.synapse.ai
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
schemes:
  Synapse:
    build:
      targets:
        Synapse: [all]
